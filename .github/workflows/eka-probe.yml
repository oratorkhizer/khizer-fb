name: eka-probe
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run eka.care connection probe
        env:
          EKA_CLIENT_ID: ${{ secrets.EKA_CLIENT_ID }}
          EKA_CLIENT_SECRET: ${{ secrets.EKA_CLIENT_SECRET }}
        run: python engine/loop_probe_eka.py
      - name: Commit report
        run: |
          git config user.name "khizer-bot"
          git config user.email "khizer-bot@users.noreply.github.com"
          git add eka_probe_report.md
          git commit -m "probe: eka.care connection report" || echo "no changes"
          git push

